services:
  postgres:
    image: postgres:16-alpine
    container_name: garage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: garage
      POSTGRES_DB: garage
    ports:
      - "5432:5432"
    volumes:
      - garage-pgdata:/var/lib/postgresql/data

volumes:
  garage-pgdata:
